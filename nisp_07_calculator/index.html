<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator iOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="btn light-gray" id="clear">C</button>
            <button class="btn light-gray" disabled>+/-</button>
            <button class="btn light-gray" disabled>%</button>
            <button class="btn orange operator" data-action="/">÷</button>

            <button class="btn dark-gray number" data-number="7">7</button>
            <button class="btn dark-gray number" data-number="8">8</button>
            <button class="btn dark-gray number" data-number="9">9</button>
            <button class="btn orange operator" data-action="*">×</button>

            <button class="btn dark-gray number" data-number="4">4</button>
            <button class="btn dark-gray number" data-number="5">5</button>
            <button class="btn dark-gray number" data-number="6">6</button>
            <button class="btn orange operator" data-action="-">-</button>

            <button class="btn dark-gray number" data-number="1">1</button>
            <button class="btn dark-gray number" data-number="2">2</button>
            <button class="btn dark-gray number" data-number="3">3</button>
            <button class="btn orange operator" data-action="+">+</button>

            <button class="btn dark-gray zero number" data-number="0">0</button>
            <button class="btn dark-gray number" data-number=".">,</button>
            <button class="btn orange" id="equals">=</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
